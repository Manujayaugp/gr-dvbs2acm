id: dvbs2acm_fec_encoder_acm
label: DVB-S2 FEC Encoder (ACM)
category: '[DVB-S2 ACM]/Transmitter'

templates:
  imports: import dvbs2acm
  make: "dvbs2acm.fec_encoder_acm(frame_size=${frame_size}, ldpc_algorithm=${ldpc_algorithm}, initial_modcod=${initial_modcod})"

parameters:
  - id: frame_size
    label: FECFRAME Size
    dtype: enum
    options: [dvbs2acm.FrameSize.NORMAL, dvbs2acm.FrameSize.SHORT]
    option_labels: [Normal (64800 bits), Short (16200 bits)]
    default: dvbs2acm.FrameSize.NORMAL

  - id: ldpc_algorithm
    label: LDPC Algorithm
    dtype: enum
    options: [dvbs2acm.LdpcAlgorithm.ONESIDE, dvbs2acm.LdpcAlgorithm.TWOSIDE, dvbs2acm.LdpcAlgorithm.PHILOG]
    option_labels: [One-Side, Two-Side, Phi-Log]
    default: dvbs2acm.LdpcAlgorithm.ONESIDE

  - id: initial_modcod
    label: Initial MODCOD
    dtype: int
    default: 4

inputs:
-   domain: stream
    dtype: byte
    label: BBFRAME bits

outputs:
-   domain: stream
    dtype: byte
    label: FECFRAME bits

documentation: |
  DVB-S2 FEC Encoder with ACM (ETSI EN 302 307-1 §5.3)

  Performs spec-compliant BCH outer coding + LDPC inner coding using
  gr-dtv (dvb_bch_bb → dvb_ldpc_bb). All 28 MODCODs supported.

  ACM operation: reads 'modcod' stream tag on the input and switches
  BCH/LDPC parameters per-frame automatically. Sub-flowgraphs are
  cached per MODCOD so switching overhead is minimal.

  MODCOD → kbch info bits in, 64800 coded bits out
    QPSK  1/4  (ID  1): kbch=16008, parity=48792
    QPSK  1/2  (ID  4): kbch=32208, parity=32592
    8PSK  3/4  (ID 14): kbch=48408, parity=16392
    16APSK 2/3 (ID 18): kbch=43040, parity=21760
    32APSK 9/10(ID 28): kbch=58192, parity= 6608

  Requires: gr-dtv (included with GNU Radio 3.10+)

file_format: 1
