id: dvbs2acm_bb_framer_acm
label: DVB-S2 BB Framer (ACM)
category: '[DVB-S2 ACM]/Transmitter'

templates:
  imports: import dvbs2acm
  make: "dvbs2acm.bb_framer_acm(frame_size=${frame_size}, stream_type=${stream_type}, pilots=${pilots}, initial_modcod=${initial_modcod})"

parameters:
  - id: frame_size
    label: FECFRAME Size
    dtype: enum
    options: [dvbs2acm.FrameSize.NORMAL, dvbs2acm.FrameSize.SHORT]
    option_labels: [Normal (64800 bits), Short (16200 bits)]
    default: dvbs2acm.FrameSize.NORMAL

  - id: stream_type
    label: Stream Type
    dtype: enum
    options: [dvbs2acm.StreamType.TRANSPORT, dvbs2acm.StreamType.GENERIC]
    option_labels: [Transport Stream (TS), Generic Stream (GS)]
    default: dvbs2acm.StreamType.TRANSPORT

  - id: pilots
    label: Pilot Symbols
    dtype: bool
    default: 'True'
    options: ['True', 'False']
    option_labels: [Enabled, Disabled]

  - id: initial_modcod
    label: Initial MODCOD
    dtype: int
    default: 4

inputs:
-   domain: stream
    dtype: byte
    label: TS in
-   domain: message
    id: modcod_in
    optional: true

outputs:
-   domain: stream
    dtype: byte
    label: BBFRAME out

documentation: |
  DVB-S2 Baseband Framer with ACM Support (ETSI EN 302 307-1 §5.1)

  Constructs BBFRAME from MPEG-TS packets:
    - 80-bit BBHEADER (MATYPE, ISI, UPL, DFL, SYNC, SYNCD, CRC-8)
    - Data Field filled with TS packet bytes
    - Padding with inverted sync byte pattern

  In ACM mode, reads "modcod" stream tags to dynamically adjust
  the BBFRAME size (kbch) per the selected MODCOD.

  Output: Unpacked bit stream ready for FEC encoding.

file_format: 1
